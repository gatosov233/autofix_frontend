<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirmación de Agenda - AutoFix</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #2c2c2c;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #222;
      margin: 0;
      padding: 0;
    }
    .navbar {
      background-color: #b71c1c;
    }
    .navbar-brand,
    .navbar-nav .nav-link,
    .navbar-nav .btn {
      color: white !important;
    }
    .confirmacion-container {
      max-width: 600px;
      background-color: #b71c1c;
      color: white;
      margin: 5rem auto;
      padding: 2.5rem 2rem;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(183, 28, 28, 0.5);
    }
    .confirmacion-container h1 {
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .confirmacion-container p {
      font-size: 1.25rem;
      margin-bottom: 0;
    }
    a.email-link {
      color: #ffffff;
      text-decoration: underline;
    }
    a.email-link:hover {
      color: #000000;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <iframe
    src="partials/navbar.html"
    title="Barra de navegación"
    style="width:100%;height:66px;border:0;display:block"
    loading="eager"></iframe>

  <main>
    <section class="confirmacion-container">
      <h1>Agenda Confirmada</h1>
      <p>Su agenda se ha completado con éxito.</p>
      <p>Para cualquier consulta, escríbanos a:</p>
      <p><a class="email-link" href="mailto:autofix.consulta@gmail.com">autofix.consulta@gmail.com</a></p>
    </section>
  </main>

  <iframe
    src="partials/footer.html"
    title="Pie de página"
    style="width:100%;height:72px;border:0;display:block"
    loading="lazy"></iframe>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
