<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
    
<iframe
  src="partials/navbar.html"
  title="Barra de navegación"
  style="width:100%;height:76px;border:0;display:block"
  loading="eager"></iframe>

  <!-- Login -->
  <div class="d-flex justify-content-center align-items-center min-vh-100 fondo">
    <div class="card p-4 shadow-lg login-card">
      <h2 class="text-center mb-4">Iniciar Sesión</h2>
      <form>
        <div class="mb-3">
          <label for="email" class="form-label">Correo</label>
          <input type="email" class="form-control" id="email" placeholder="tu@correo.com" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="********" required>
        </div>
        <button type="submit" class="btn btn-custom w-100">Entrar</button>
        <div class="text-center mt-3">
          <a href="singup.html" class="link-custom">¿Olvidaste tu contraseña?</a>
        </div>
      </form>
    </div>
  </div>

  <iframe
    src="partials/footer.html"
    title="Pie de página"
    style="width:100%;height:66px;border:0;display:block"
    loading="lazy"></iframe>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
