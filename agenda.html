<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agendar Servicio - AutoFix</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/agenda.css">
  <link rel="stylesheet" href="css/accesisibility.css">
</head>
<body>
  <span id="normal" class="a11y-target" aria-hidden="true"></span>
  <span id="texto-grande" class="a11y-target" aria-hidden="true"></span>
  <span id="contraste" class="a11y-target" aria-hidden="true"></span>
  <span id="contraste-texto" class="a11y-target" aria-hidden="true"></span>
  <div class="page-shell">

  <!-- NAVBAR -->
  <iframe
    src="partials/navbar.html"
    title="Barra de navegación"
    style="width:100%;height:66px;border:0;display:block"
    loading="eager"></iframe>

  <!-- SECCIÓN AGENDA -->
  <section class="container py-5">
    <div class="text-center mb-5">
      <h2 class="fw-bold">Agendar Servicio</h2>
      <p class="lead">Completa el formulario para reservar una cita con nosotros</p>
    </div>
    
    <div class="row justify-content-center">
      <div class="col-md-8">
        <form class="bg-light p-4 rounded shadow-sm" action="agendacompleta.html" method="get">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre completo</label>
            <input type="text" class="form-control" id="nombre" required>
          </div>
          <div class="mb-3">
            <label for="correo" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="correo" required>
          </div>
          <div class="mb-3">
            <label for="telefono" class="form-label">Teléfono</label>
            <input type="tel" class="form-control" id="telefono" required>
          </div>
          <div class="mb-3">
            <label for="servicio" class="form-label">Tipo de servicio</label>
            <select class="form-select" id="servicio" required>
              <option selected disabled value="">Selecciona una opción</option>
              <option>Revisión General</option>
              <option>Cambio de Aceite</option>
              <option>Diagnóstico Electrónico</option>
              <option>Frenos</option>
              <option>Alineación y Balanceo</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="fecha" class="form-label">Fecha</label>
            <input type="date" class="form-control" id="fecha" required>
          </div>
          <div class="mb-3">
            <label for="hora" class="form-label">Hora</label>
            <input type="time" class="form-control" id="hora" required>
         </div>
          <button type="submit" class="btn btn-danger">Confirmar Reserva</button>
        </form>
      </div>
    </div>
  </section>

  <iframe
    src="partials/footer.html"
    title="Pie de página"
    style="width:100%;height:72px;border:0;display:block"
    loading="lazy"></iframe>
  </div>
  <details class="a11y-widget">
    <summary>Accesibilidad</summary>
    <div class="a11y-panel">
      <p>Cambia el tamaño del texto, el contraste y el contraste del texto para una mejor experiencia.</p>
      <div class="a11y-grid">
        <a class="a11y-option" href="#texto-grande">Texto grande</a>
        <a class="a11y-option" href="#contraste">Alto contraste</a>
        <a class="a11y-option" href="#contraste-texto">Contraste + texto</a>
        <a class="a11y-option" href="#normal">Restablecer</a>
      </div>
    </div>
  </details>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
